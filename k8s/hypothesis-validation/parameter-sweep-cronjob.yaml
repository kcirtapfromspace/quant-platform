# CronJob: weekly parameter sweep across all 5 alpha hypotheses.
# Runs every Sunday at 02:00 UTC. Spawns one Job per parameter combination
# via the sweep orchestrator script.
apiVersion: batch/v1
kind: CronJob
metadata:
  name: hypothesis-sweep
  namespace: hypothesis-validation
spec:
  schedule: "0 2 * * 0"  # Sunday 02:00 UTC
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 1
      activeDeadlineSeconds: 600  # 10 minutes to spawn all child Jobs
      template:
        metadata:
          labels:
            app: hypothesis-sweep-orchestrator
        spec:
          restartPolicy: OnFailure
          serviceAccountName: hypothesis-sweep-sa
          volumes:
            - name: backtest-results
              persistentVolumeClaim:
                claimName: backtest-results
            - name: hypothesis-params
              configMap:
                name: hypothesis-sweep-params
            - name: hyp-config
              configMap:
                name: hypothesis-config
          containers:
            - name: sweep-orchestrator
              image: mirror.registry:5000/quant-rs:latest
              imagePullPolicy: Always
              command:
                - python
                - -m
                - quant.scripts.k8s_hypothesis_sweep
                - --submit
                - --namespace
                - hypothesis-validation
              env:
                - name: RESULTS_PATH
                  value: /results
              volumeMounts:
                - name: backtest-results
                  mountPath: /results
                - name: hypothesis-params
                  mountPath: /etc/hypothesis-params
                - name: hyp-config
                  mountPath: /etc/hypothesis-config
              resources:
                requests:
                  cpu: "100m"
                  memory: "256Mi"
                limits:
                  cpu: "500m"
                  memory: "512Mi"

---
# ServiceAccount + ClusterRole for the sweep orchestrator to create Jobs.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: hypothesis-sweep-sa
  namespace: hypothesis-validation

---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: hypothesis-job-creator
  namespace: hypothesis-validation
rules:
  - apiGroups: ["batch"]
    resources: ["jobs"]
    verbs: ["create", "get", "list", "watch", "delete"]
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: hypothesis-sweep-job-creator
  namespace: hypothesis-validation
subjects:
  - kind: ServiceAccount
    name: hypothesis-sweep-sa
    namespace: hypothesis-validation
roleRef:
  kind: Role
  name: hypothesis-job-creator
  apiGroup: rbac.authorization.k8s.io
