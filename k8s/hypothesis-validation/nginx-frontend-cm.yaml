# nginx ConfigMap for quant-frontend: overrides the Dockerfile-embedded config.
# Listens on 8080, proxies /api/ and /ws to quant-api (cluster-internal).
# QUA-109: Dockerfile bakes a port-80-only config; this ConfigMap override fixes it.
apiVersion: v1
kind: ConfigMap
metadata:
  name: nginx-frontend-config
  namespace: hypothesis-validation
data:
  default.conf: |
    server {
      listen 8080;
      root /usr/share/nginx/html;
      index index.html;

      location / {
        try_files $uri $uri/ /index.html;
      }

      location /api/ {
        proxy_pass http://quant-api:8080/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      }

      location /ws {
        proxy_pass http://quant-api:8080/ws;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 86400;
      }
    }
