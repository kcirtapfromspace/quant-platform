# quant-frontend: nginx serving the React 19 trading dashboard SPA
# Proxies /api/ and /ws to the quant-api service (cluster-internal)
# Namespace: hypothesis-validation
# Image: ghcr.io/kcirtapfromspace/quant-frontend:latest (ARM64)
# QUA-110 delivers the image; QUA-109 deploys it here.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: quant-frontend
  namespace: hypothesis-validation
  labels:
    app: quant-frontend
    component: frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: quant-frontend
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  template:
    metadata:
      labels:
        app: quant-frontend
        component: frontend
    spec:
      imagePullSecrets:
        - name: ghcr-creds
      volumes:
        - name: nginx-config
          configMap:
            name: nginx-frontend-config
      containers:
        - name: quant-frontend
          image: ghcr.io/kcirtapfromspace/quant-frontend:latest
          imagePullPolicy: Always
          volumeMounts:
            - name: nginx-config
              mountPath: /etc/nginx/conf.d/default.conf
              subPath: default.conf
          ports:
            - name: http
              containerPort: 8080
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "200m"
              memory: "128Mi"
          livenessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 30
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 3
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: quant-frontend
  namespace: hypothesis-validation
  labels:
    app: quant-frontend
spec:
  selector:
    app: quant-frontend
  ports:
    - name: http
      port: 80
      targetPort: 8080
  type: ClusterIP
