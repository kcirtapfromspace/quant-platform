# Tailscale Ingress: exposes quant-frontend on the tailnet as quant.tail16ecc2.ts.net
# QUA-109: updated from quant-server (bare health page) to quant-frontend (full dashboard)
# nginx inside quant-frontend proxies /api/ and /ws to quant-api service.
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: quant-server
  namespace: hypothesis-validation
  annotations:
    tailscale.com/tags: "tag:k8s"
spec:
  ingressClassName: tailscale
  defaultBackend:
    service:
      name: quant-frontend
      port:
        number: 80
  tls:
    - hosts:
        - quant
