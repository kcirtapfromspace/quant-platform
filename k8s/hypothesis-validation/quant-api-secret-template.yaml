# quant-api-credentials secret template — DO NOT COMMIT WITH REAL VALUES
# Create with:
#   kubectl create secret generic quant-api-credentials \
#     --namespace hypothesis-validation \
#     --from-literal=QUANT_API_KEY=<generate with: openssl rand -hex 32>
#
# Or manually apply this file with the value base64-encoded:
#   echo -n "<your-key>" | base64
apiVersion: v1
kind: Secret
metadata:
  name: quant-api-credentials
  namespace: hypothesis-validation
type: Opaque
data:
  # base64-encoded API key — replace with: echo -n "your-key" | base64
  QUANT_API_KEY: REPLACE_WITH_BASE64_ENCODED_KEY
