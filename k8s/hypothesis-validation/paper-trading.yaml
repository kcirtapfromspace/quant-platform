# Paper-trading stack — quant-server (Rust Axum API, data/OMS access)
# Namespace: hypothesis-validation
# PVCs: market-data (RWO, 50Gi) + run-e-state (RWO, 1Gi, reserved for QUA-90 run-e)
# QUA-90: run-e Rust daemon will be added as a sidecar once Alpaca creds arrive (QUA-87)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: quant-server
  namespace: hypothesis-validation
  labels:
    app: quant-server
spec:
  replicas: 1
  selector:
    matchLabels:
      app: quant-server
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: quant-server
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
        prometheus.io/path: "/metrics"
    spec:
      imagePullSecrets:
        - name: ghcr-creds
      securityContext:
        fsGroup: 999
        runAsUser: 999
        runAsGroup: 999
      nodeSelector:
        kubernetes.io/hostname: talos-lwn-dba
      volumes:
        - name: market-data
          persistentVolumeClaim:
            claimName: market-data
        - name: run-e-state
          persistentVolumeClaim:
            claimName: run-e-state
      containers:
        # ── Rust Axum API server (QUA-102) ──────────────────────────────────
        # quant serve is now the full REST+WebSocket API gateway (quant-api crate).
        # Port 8080. Requires QUANT_API_KEY and QUANT_API_CORS_ORIGIN.
        - name: quant-server
          image: ghcr.io/kcirtapfromspace/quant-rs:latest
          imagePullPolicy: Always
          command:
            - /usr/local/bin/quant
            - serve
            - --port
            - "8080"
            - --db
            - /data/quant.duckdb
          env:
            - name: QUANT_API_KEY
              valueFrom:
                secretKeyRef:
                  name: quant-api-secret
                  key: api_key
            - name: QUANT_API_CORS_ORIGIN
              value: "https://dashboard.tail16ecc2.ts.net"
          volumeMounts:
            - name: market-data
              mountPath: /data
          ports:
            - name: http
              containerPort: 8080
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 30
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 3
            periodSeconds: 10

        # ── Rust runE paper-trading daemon ──────────────────────────────────
        # PENDING QUA-90: add run-e Rust sidecar here once QUA-87 (Alpaca creds) is resolved.
        # run-e-state PVC is pre-allocated and ready (/app/data mount).

---
apiVersion: v1
kind: Service
metadata:
  name: quant-server
  namespace: hypothesis-validation
  annotations:
    prometheus.io/scrape: "true"
    prometheus.io/port: "8080"
    prometheus.io/path: "/metrics"
spec:
  selector:
    app: quant-server
  ports:
    - name: http
      port: 80
      targetPort: 8080
  type: ClusterIP
