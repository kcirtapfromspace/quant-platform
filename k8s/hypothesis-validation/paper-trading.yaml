# Quant-rs status server: serves health/status endpoints and Prometheus metrics.
# Exposed via Tailscale Ingress for remote access.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: quant-server
  namespace: hypothesis-validation
  labels:
    app: quant-server
spec:
  replicas: 1
  selector:
    matchLabels:
      app: quant-server
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: quant-server
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8000"
        prometheus.io/path: "/metrics"
    spec:
      imagePullSecrets:
        - name: ghcr-creds
      containers:
        - name: quant-server
          image: ghcr.io/kcirtapfromspace/quant-rs:latest
          imagePullPolicy: Always
          command:
            - /usr/local/bin/quant
            - serve
            - --port
            - "8000"
          ports:
            - name: http
              containerPort: 8000
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 30
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 3
            periodSeconds: 10

---
apiVersion: v1
kind: Service
metadata:
  name: quant-server
  namespace: hypothesis-validation
  annotations:
    prometheus.io/scrape: "true"
    prometheus.io/port: "8000"
spec:
  selector:
    app: quant-server
  ports:
    - name: http
      port: 80
      targetPort: 8000
  type: ClusterIP
