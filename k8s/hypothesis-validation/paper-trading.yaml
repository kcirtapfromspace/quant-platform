# Paper trading deployment: runs signal-generation + Alpaca order execution
# from the cluster, using Sealed Secrets for API key management.
#
# Prerequisite: create the SealedSecret first (see sealed-secrets/README.md):
#   kubectl create secret generic alpaca-paper-creds \
#     --from-literal=ALPACA_API_KEY=<key> \
#     --from-literal=ALPACA_SECRET_KEY=<secret> \
#     --namespace hypothesis-validation --dry-run=client -o yaml \
#     | kubeseal --controller-namespace kube-system -o yaml \
#     > k8s/hypothesis-validation/sealed-secrets/alpaca-paper-creds.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: paper-trading
  namespace: hypothesis-validation
  labels:
    app: paper-trading
spec:
  replicas: 1
  selector:
    matchLabels:
      app: paper-trading
  strategy:
    type: Recreate  # only one instance at a time
  template:
    metadata:
      labels:
        app: paper-trading
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8000"
        prometheus.io/path: "/metrics"
    spec:
      volumes:
        - name: market-data
          persistentVolumeClaim:
            claimName: market-data
      containers:
        - name: paper-trading
          image: mirror.registry:5000/quant-rs:latest
          imagePullPolicy: Always
          command:
            - python
            - -m
            - quant.scripts.run_strategy
            - schedule
            - --mode
            - paper
            - --time
            - "16:05"
            - --metrics-port
            - "8000"
          env:
            - name: DB_PATH
              value: /data/market.duckdb
            - name: ALPACA_API_KEY
              valueFrom:
                secretKeyRef:
                  name: alpaca-paper-creds
                  key: ALPACA_API_KEY
            - name: ALPACA_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: alpaca-paper-creds
                  key: ALPACA_SECRET_KEY
            - name: ALPACA_BASE_URL
              value: "https://paper-api.alpaca.markets"
          volumeMounts:
            - name: market-data
              mountPath: /data
          ports:
            - name: metrics
              containerPort: 8000
          resources:
            requests:
              cpu: "500m"
              memory: "1Gi"
            limits:
              cpu: "2"
              memory: "2Gi"
          livenessProbe:
            httpGet:
              path: /metrics
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 60
            failureThreshold: 3

---
apiVersion: v1
kind: Service
metadata:
  name: paper-trading
  namespace: hypothesis-validation
  annotations:
    prometheus.io/scrape: "true"
    prometheus.io/port: "8000"
spec:
  selector:
    app: paper-trading
  ports:
    - name: metrics
      port: 8000
      targetPort: 8000
  type: ClusterIP
