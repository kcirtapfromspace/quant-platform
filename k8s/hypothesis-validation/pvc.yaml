---
# Market data PVC — shared read-only by all backtest jobs
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: market-data
  namespace: hypothesis-validation
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: longhorn
  resources:
    requests:
      storage: 50Gi

---
# runE daemon state PVC — persists run_e_state.json across pod restarts (QUA-90)
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: run-e-state
  namespace: hypothesis-validation
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: longhorn
  resources:
    requests:
      storage: 1Gi

---
# Backtest results PVC — written by jobs, read by reporting
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: backtest-results
  namespace: hypothesis-validation
spec:
  accessModes:
    - ReadWriteMany
  storageClassName: longhorn
  resources:
    requests:
      storage: 20Gi
