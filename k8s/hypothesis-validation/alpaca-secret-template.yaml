# Alpaca paper-trading credentials — QUA-87 / QUA-90
# DO NOT commit real values. Apply manually after obtaining credentials from Alpaca dashboard.
# https://app.alpaca.markets/paper-trading/account
#
# To apply:
#   kubectl -n hypothesis-validation create secret generic alpaca-credentials \
#     --from-literal=ALPACA_API_KEY=<your-key-id> \
#     --from-literal=ALPACA_SECRET_KEY=<your-secret-key> \
#     --dry-run=client -o yaml | kubectl apply -f -
#
apiVersion: v1
kind: Secret
metadata:
  name: alpaca-credentials
  namespace: hypothesis-validation
type: Opaque
stringData:
  ALPACA_API_KEY: REPLACE_WITH_PAPER_API_KEY_ID
  ALPACA_SECRET_KEY: REPLACE_WITH_PAPER_SECRET_KEY
