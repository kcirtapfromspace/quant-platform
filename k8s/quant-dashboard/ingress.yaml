# Tailscale Ingress: exposes quant-dashboard on the tailnet as dashboard.tail16ecc2.ts.net
# Separate from quant.tail16ecc2.ts.net (Rust status page) to avoid disruption.
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: quant-dashboard
  namespace: hypothesis-validation
  annotations:
    tailscale.com/tags: "tag:k8s"
spec:
  ingressClassName: tailscale
  defaultBackend:
    service:
      name: quant-dashboard
      port:
        number: 80
  tls:
    - hosts:
        - dashboard
