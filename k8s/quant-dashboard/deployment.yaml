# quant-dashboard — React+Express production dashboard
# QUA-95: Board-requested frontend production deployment
# Exposed via Tailscale ingress at dashboard.tail16ecc2.ts.net
apiVersion: apps/v1
kind: Deployment
metadata:
  name: quant-dashboard
  namespace: hypothesis-validation
  labels:
    app: quant-dashboard
spec:
  replicas: 1
  selector:
    matchLabels:
      app: quant-dashboard
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: quant-dashboard
      annotations:
        prometheus.io/scrape: "false"
    spec:
      imagePullSecrets:
        - name: ghcr-creds
      securityContext:
        fsGroup: 999
        runAsUser: 999
        runAsGroup: 999
      volumes:
        - name: run-e-state
          persistentVolumeClaim:
            claimName: run-e-state
            readOnly: true
      containers:
        - name: quant-dashboard
          image: ghcr.io/kcirtapfromspace/quant-dashboard:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 3001
          env:
            - name: NODE_ENV
              value: "production"
            - name: PORT
              value: "3001"
            - name: ALPACA_PAPER
              value: "true"
            - name: RUN_E_STATE_PATH
              value: "/app/data/run_e_state.json"
            - name: ALPACA_API_KEY
              valueFrom:
                secretKeyRef:
                  name: alpaca-credentials
                  key: ALPACA_API_KEY
                  optional: true
            - name: ALPACA_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: alpaca-credentials
                  key: ALPACA_SECRET_KEY
                  optional: true
          volumeMounts:
            - name: run-e-state
              mountPath: /app/data
              readOnly: true
          resources:
            requests:
              cpu: "200m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          livenessProbe:
            httpGet:
              path: /api/watchlist
              port: 3001
            initialDelaySeconds: 15
            periodSeconds: 30
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /api/watchlist
              port: 3001
            initialDelaySeconds: 5
            periodSeconds: 10
