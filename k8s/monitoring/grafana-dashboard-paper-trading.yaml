# Grafana dashboard ConfigMap — paper trading (QUA-91)
# Namespace: loki (co-located with the K8s Grafana instance)
# Sidecar (grafana-sc-dashboard) watches for label grafana_dashboard: "1"
# and writes the JSON to /tmp/dashboards, where the file-provider loads it.
# uid: quant-paper-trading | folder: Quant
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-paper-trading
  namespace: loki
  labels:
    grafana_dashboard: "1"
    app.kubernetes.io/part-of: quant-platform
  annotations:
    grafana_folder: "Quant"
data:
  paper_trading.json: |
    {
      "id": null,
      "uid": "quant-paper-trading",
      "title": "Quant Platform — Paper Trading ($1M Notional)",
      "description": "Real-time P&L, drawdown (CRO thresholds), sector exposure, and daily trade log for the Alpaca paper trading account.",
      "tags": ["quant", "paper-trading", "pnl", "risk", "alpaca"],
      "timezone": "browser",
      "schemaVersion": 38,
      "version": 1,
      "refresh": "30s",
      "time": { "from": "now-1d", "to": "now" },
      "panels": [
        {
          "id": 1,
          "type": "stat",
          "title": "Adapter Status",
          "description": "Alpaca paper trading adapter connectivity.",
          "gridPos": { "x": 0, "y": 0, "w": 3, "h": 4 },
          "options": {
            "reduceOptions": { "calcs": ["lastNotNull"] },
            "colorMode": "background",
            "graphMode": "none",
            "textMode": "value_and_name"
          },
          "fieldConfig": {
            "defaults": {
              "mappings": [
                { "type": "value", "options": {
                  "0": { "text": "DISCONNECTED", "color": "red" },
                  "1": { "text": "CONNECTED", "color": "green" }
                }}
              ],
              "thresholds": { "mode": "absolute", "steps": [{ "color": "red", "value": null }, { "color": "green", "value": 1 }] }
            }
          },
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "expr": "quant_paper_adapter_connected",
              "legendFormat": "Alpaca Paper",
              "instant": true
            }
          ]
        },
        {
          "id": 2,
          "type": "stat",
          "title": "Circuit Breaker",
          "description": "Fires when DD > 8% or daily P&L < -3%.",
          "gridPos": { "x": 3, "y": 0, "w": 3, "h": 4 },
          "options": {
            "reduceOptions": { "calcs": ["lastNotNull"] },
            "colorMode": "background",
            "graphMode": "none",
            "textMode": "value_and_name"
          },
          "fieldConfig": {
            "defaults": {
              "mappings": [
                { "type": "value", "options": {
                  "0": { "text": "ACTIVE", "color": "green" },
                  "1": { "text": "TRIPPED", "color": "red" }
                }}
              ],
              "thresholds": { "mode": "absolute", "steps": [{ "color": "green", "value": null }, { "color": "red", "value": 1 }] }
            }
          },
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "expr": "quant_circuit_breaker_tripped",
              "legendFormat": "Trading",
              "instant": true
            }
          ]
        },
        {
          "id": 3,
          "type": "stat",
          "title": "Portfolio Value",
          "gridPos": { "x": 6, "y": 0, "w": 4, "h": 4 },
          "options": {
            "reduceOptions": { "calcs": ["lastNotNull"] },
            "colorMode": "value",
            "graphMode": "area",
            "textMode": "value_and_name"
          },
          "fieldConfig": {
            "defaults": {
              "unit": "currencyUSD",
              "decimals": 0,
              "thresholds": { "mode": "absolute", "steps": [{ "color": "blue", "value": null }] }
            }
          },
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "expr": "quant_paper_portfolio_value_dollars",
              "legendFormat": "Portfolio",
              "instant": true
            }
          ]
        },
        {
          "id": 4,
          "type": "stat",
          "title": "Daily P&L",
          "description": "P&L for the current trading day. Alert fires below -3% of notional.",
          "gridPos": { "x": 10, "y": 0, "w": 4, "h": 4 },
          "options": {
            "reduceOptions": { "calcs": ["lastNotNull"] },
            "colorMode": "background",
            "graphMode": "area",
            "textMode": "value_and_name"
          },
          "fieldConfig": {
            "defaults": {
              "unit": "currencyUSD",
              "decimals": 0,
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "red", "value": null },
                  { "color": "yellow", "value": -15000 },
                  { "color": "green", "value": 0 }
                ]
              }
            }
          },
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "expr": "quant_paper_daily_pnl_dollars",
              "legendFormat": "Daily P&L",
              "instant": true
            }
          ]
        },
        {
          "id": 5,
          "type": "stat",
          "title": "Realized P&L (Inception)",
          "gridPos": { "x": 14, "y": 0, "w": 4, "h": 4 },
          "options": {
            "reduceOptions": { "calcs": ["lastNotNull"] },
            "colorMode": "background",
            "graphMode": "area",
            "textMode": "value_and_name"
          },
          "fieldConfig": {
            "defaults": {
              "unit": "currencyUSD",
              "decimals": 0,
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "red", "value": null },
                  { "color": "yellow", "value": -50000 },
                  { "color": "green", "value": 0 }
                ]
              }
            }
          },
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "expr": "quant_paper_realized_pnl_dollars",
              "legendFormat": "Realized P&L",
              "instant": true
            }
          ]
        },
        {
          "id": 6,
          "type": "stat",
          "title": "Open Positions",
          "gridPos": { "x": 18, "y": 0, "w": 3, "h": 4 },
          "options": {
            "reduceOptions": { "calcs": ["lastNotNull"] },
            "colorMode": "value",
            "graphMode": "none"
          },
          "fieldConfig": {
            "defaults": {
              "unit": "short",
              "thresholds": { "mode": "absolute", "steps": [{ "color": "blue", "value": null }] }
            }
          },
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "expr": "quant_paper_positions_open",
              "legendFormat": "Positions",
              "instant": true
            }
          ]
        },
        {
          "id": 7,
          "type": "gauge",
          "title": "Drawdown (CRO Thresholds)",
          "description": "Yellow ≥10%, Orange ≥15%, Red ≥20%. Circuit breaker fires at 8%.",
          "gridPos": { "x": 21, "y": 0, "w": 3, "h": 4 },
          "options": {
            "reduceOptions": { "calcs": ["lastNotNull"] },
            "showThresholdLabels": true,
            "showThresholdMarkers": true
          },
          "fieldConfig": {
            "defaults": {
              "unit": "percentunit",
              "min": 0,
              "max": 0.25,
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "yellow", "value": 0.10 },
                  { "color": "orange", "value": 0.15 },
                  { "color": "red", "value": 0.20 }
                ]
              }
            }
          },
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "expr": "quant_paper_drawdown_current",
              "legendFormat": "Drawdown",
              "instant": true
            }
          ]
        },
        {
          "id": 8,
          "type": "timeseries",
          "title": "Cumulative P&L",
          "description": "Realized + unrealized P&L over time.",
          "gridPos": { "x": 0, "y": 4, "w": 16, "h": 8 },
          "options": {
            "tooltip": { "mode": "multi" },
            "legend": { "displayMode": "list", "placement": "bottom" }
          },
          "fieldConfig": {
            "defaults": {
              "unit": "currencyUSD",
              "custom": {
                "lineWidth": 2,
                "fillOpacity": 10
              },
              "thresholds": { "mode": "absolute", "steps": [{ "color": "green", "value": null }] }
            },
            "overrides": [
              {
                "matcher": { "id": "byName", "options": "Daily P&L" },
                "properties": [
                  { "id": "custom.lineWidth", "value": 1 },
                  { "id": "custom.fillOpacity", "value": 0 },
                  { "id": "custom.lineStyle", "value": { "dash": [4, 4], "fill": "dash" } }
                ]
              },
              {
                "matcher": { "id": "byName", "options": "Unrealized P&L" },
                "properties": [
                  { "id": "color", "value": { "mode": "fixed", "fixedColor": "blue" } }
                ]
              }
            ]
          },
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "expr": "quant_paper_realized_pnl_dollars",
              "legendFormat": "Realized P&L"
            },
            {
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "expr": "quant_paper_unrealized_pnl_dollars",
              "legendFormat": "Unrealized P&L"
            },
            {
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "expr": "quant_paper_realized_pnl_dollars + quant_paper_unrealized_pnl_dollars",
              "legendFormat": "Total P&L"
            }
          ]
        },
        {
          "id": 9,
          "type": "timeseries",
          "title": "Drawdown History",
          "description": "Drawdown over time with CRO threshold bands.",
          "gridPos": { "x": 16, "y": 4, "w": 8, "h": 8 },
          "options": {
            "tooltip": { "mode": "single" },
            "legend": { "displayMode": "list", "placement": "bottom" }
          },
          "fieldConfig": {
            "defaults": {
              "unit": "percentunit",
              "min": 0,
              "custom": { "lineWidth": 2, "fillOpacity": 20 },
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "yellow", "value": 0.10 },
                  { "color": "orange", "value": 0.15 },
                  { "color": "red", "value": 0.20 }
                ]
              },
              "color": { "mode": "thresholds" }
            }
          },
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "expr": "quant_paper_drawdown_current",
              "legendFormat": "Drawdown"
            }
          ]
        },
        {
          "id": 10,
          "type": "bargauge",
          "title": "Sector Exposure ($)",
          "description": "Gross dollar exposure by GICS sector. Target: no single sector > 30% of notional.",
          "gridPos": { "x": 0, "y": 12, "w": 12, "h": 8 },
          "options": {
            "reduceOptions": { "calcs": ["lastNotNull"] },
            "orientation": "horizontal",
            "displayMode": "gradient",
            "valueMode": "color"
          },
          "fieldConfig": {
            "defaults": {
              "unit": "currencyUSD",
              "decimals": 0,
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "yellow", "value": 200000 },
                  { "color": "red", "value": 300000 }
                ]
              }
            }
          },
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "expr": "quant_paper_sector_exposure_dollars",
              "legendFormat": "{{sector}}"
            }
          ]
        },
        {
          "id": 11,
          "type": "bargauge",
          "title": "Sector Exposure (%)",
          "description": "Sector exposure as % of portfolio value.",
          "gridPos": { "x": 12, "y": 12, "w": 12, "h": 8 },
          "options": {
            "reduceOptions": { "calcs": ["lastNotNull"] },
            "orientation": "horizontal",
            "displayMode": "gradient",
            "valueMode": "color"
          },
          "fieldConfig": {
            "defaults": {
              "unit": "percentunit",
              "decimals": 1,
              "min": 0,
              "max": 0.5,
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "yellow", "value": 0.20 },
                  { "color": "red", "value": 0.30 }
                ]
              }
            }
          },
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "expr": "quant_paper_sector_exposure_pct",
              "legendFormat": "{{sector}}"
            }
          ]
        },
        {
          "id": 12,
          "type": "timeseries",
          "title": "Daily P&L",
          "description": "Daily P&L in dollars. Alert threshold at -$30,000 (-3% of $1M notional).",
          "gridPos": { "x": 0, "y": 20, "w": 12, "h": 7 },
          "options": {
            "tooltip": { "mode": "single" },
            "legend": { "displayMode": "list", "placement": "bottom" }
          },
          "fieldConfig": {
            "defaults": {
              "unit": "currencyUSD",
              "custom": { "lineWidth": 2, "fillOpacity": 15 },
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "red", "value": null },
                  { "color": "yellow", "value": -15000 },
                  { "color": "green", "value": 0 }
                ]
              },
              "color": { "mode": "thresholds" }
            }
          },
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "expr": "quant_paper_daily_pnl_dollars",
              "legendFormat": "Daily P&L"
            }
          ]
        },
        {
          "id": 13,
          "type": "stat",
          "title": "Daily P&L %",
          "description": "Daily P&L as % of $1M notional. Circuit breaker fires at -3%.",
          "gridPos": { "x": 12, "y": 20, "w": 4, "h": 7 },
          "options": {
            "reduceOptions": { "calcs": ["lastNotNull"] },
            "colorMode": "background",
            "graphMode": "area",
            "textMode": "value_and_name"
          },
          "fieldConfig": {
            "defaults": {
              "unit": "percentunit",
              "decimals": 2,
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "red", "value": null },
                  { "color": "yellow", "value": -0.015 },
                  { "color": "green", "value": 0 }
                ]
              }
            }
          },
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "expr": "quant_paper_daily_pnl_pct",
              "legendFormat": "Daily %",
              "instant": true
            }
          ]
        },
        {
          "id": 14,
          "type": "timeseries",
          "title": "Daily Trade Count",
          "description": "Number of buy/sell trades per interval.",
          "gridPos": { "x": 16, "y": 20, "w": 8, "h": 7 },
          "options": {
            "tooltip": { "mode": "multi" },
            "legend": { "displayMode": "list", "placement": "bottom" }
          },
          "fieldConfig": {
            "defaults": {
              "unit": "short",
              "custom": { "lineWidth": 2 }
            }
          },
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "expr": "rate(quant_paper_trades_today_total{side=\"buy\"}[15m]) * 900",
              "legendFormat": "Buys (15m)"
            },
            {
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "expr": "rate(quant_paper_trades_today_total{side=\"sell\"}[15m]) * 900",
              "legendFormat": "Sells (15m)"
            }
          ]
        },
        {
          "id": 15,
          "type": "table",
          "title": "Top Positions by Market Value",
          "description": "Current open positions ranked by dollar value.",
          "gridPos": { "x": 0, "y": 27, "w": 24, "h": 7 },
          "options": {
            "sortBy": [{ "displayName": "Value ($)", "desc": true }]
          },
          "transformations": [
            { "id": "merge", "options": {} },
            {
              "id": "organize",
              "options": {
                "renameByName": {
                  "symbol": "Symbol",
                  "sector": "Sector",
                  "Value": "Value ($)",
                  "Unrealized P&L": "Unrealized P&L ($)"
                }
              }
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "currencyUSD",
              "decimals": 0
            },
            "overrides": [
              {
                "matcher": { "id": "byName", "options": "Unrealized P&L ($)" },
                "properties": [
                  {
                    "id": "thresholds",
                    "value": {
                      "mode": "absolute",
                      "steps": [
                        { "color": "red", "value": null },
                        { "color": "yellow", "value": -1000 },
                        { "color": "green", "value": 0 }
                      ]
                    }
                  },
                  { "id": "custom.displayMode", "value": "color-text" }
                ]
              }
            ]
          },
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "expr": "quant_paper_position_value_dollars",
              "legendFormat": "{{symbol}} ({{sector}})",
              "instant": true,
              "format": "table"
            },
            {
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "expr": "quant_paper_position_unrealized_pnl_dollars",
              "legendFormat": "{{symbol}} ({{sector}})",
              "instant": true,
              "format": "table"
            }
          ]
        },
        {
          "id": 16,
          "type": "timeseries",
          "title": "Adapter Errors",
          "description": "Alpaca paper adapter error rate by type.",
          "gridPos": { "x": 0, "y": 34, "w": 12, "h": 5 },
          "options": {
            "tooltip": { "mode": "multi" },
            "legend": { "displayMode": "list", "placement": "bottom" }
          },
          "fieldConfig": {
            "defaults": {
              "unit": "short",
              "custom": { "lineWidth": 1 }
            }
          },
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "expr": "rate(quant_paper_adapter_errors_total[5m])",
              "legendFormat": "Errors ({{error_type}})"
            },
            {
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "expr": "rate(quant_paper_adapter_reconnects_total[5m])",
              "legendFormat": "Reconnects"
            }
          ]
        },
        {
          "id": 17,
          "type": "timeseries",
          "title": "Fill Rate & Order Latency (p95)",
          "gridPos": { "x": 12, "y": 34, "w": 12, "h": 5 },
          "options": {
            "tooltip": { "mode": "multi" },
            "legend": { "displayMode": "list", "placement": "bottom" }
          },
          "fieldConfig": {
            "defaults": {
              "custom": { "lineWidth": 2 }
            },
            "overrides": [
              {
                "matcher": { "id": "byName", "options": "Fill Rate" },
                "properties": [{ "id": "unit", "value": "percentunit" }]
              },
              {
                "matcher": { "id": "byName", "options": "Latency p95 (s)" },
                "properties": [{ "id": "unit", "value": "s" }]
              }
            ]
          },
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "expr": "quant_fill_rate",
              "legendFormat": "Fill Rate"
            },
            {
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "expr": "histogram_quantile(0.95, sum(rate(quant_order_latency_seconds_bucket[5m])) by (le))",
              "legendFormat": "Latency p95 (s)"
            }
          ]
        }
      ]
    }
