global:
  resolve_timeout: 5m
  # Slack webhook URL — set SLACK_WEBHOOK_URL environment variable or replace inline.
  slack_api_url: "${SLACK_WEBHOOK_URL}"

templates:
  - "/etc/alertmanager/templates/*.tmpl"

route:
  group_by: ["alertname", "severity", "team"]
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h
  receiver: "slack-default"

  routes:
    - match:
        severity: critical
      receiver: "slack-critical"
      repeat_interval: 1h

    - match:
        team: risk
      receiver: "slack-risk"
      repeat_interval: 30m

    - match:
        severity: warning
      receiver: "slack-default"

receivers:
  - name: "slack-default"
    slack_configs:
      - channel: "#quant-alerts"
        send_resolved: true
        title: >-
          [{{ .Status | toUpper }}{{ if eq .Status "firing" }}:{{ .Alerts.Firing | len }}{{ end }}]
          {{ .CommonLabels.alertname }}
        text: >-
          {{ range .Alerts }}
          *Alert:* {{ .Annotations.summary }}
          *Severity:* {{ .Labels.severity }}
          *Team:* {{ .Labels.team }}
          *Details:* {{ .Annotations.description }}
          {{ end }}
        color: >-
          {{ if eq .Status "firing" }}
            {{ if eq (index .CommonLabels "severity") "critical" }}danger{{ else }}warning{{ end }}
          {{ else }}good{{ end }}

  - name: "slack-critical"
    slack_configs:
      - channel: "#quant-critical"
        send_resolved: true
        title: >-
          :red_circle: CRITICAL: {{ .CommonLabels.alertname }}
        text: >-
          {{ range .Alerts }}
          *Alert:* {{ .Annotations.summary }}
          *Description:* {{ .Annotations.description }}
          {{ end }}
        color: "danger"

  - name: "slack-risk"
    slack_configs:
      - channel: "#quant-risk"
        send_resolved: true
        title: >-
          :rotating_light: RISK ALERT: {{ .CommonLabels.alertname }}
        text: >-
          {{ range .Alerts }}
          *Alert:* {{ .Annotations.summary }}
          *Description:* {{ .Annotations.description }}
          {{ end }}
        color: >-
          {{ if eq .Status "firing" }}danger{{ else }}good{{ end }}

inhibit_rules:
  # Suppress warning alerts when a critical alert is already firing for the same team
  - source_match:
      severity: "critical"
    target_match:
      severity: "warning"
    equal: ["team"]
