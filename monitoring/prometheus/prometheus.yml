global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    env: "production"
    service: "quant-platform"

alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - alertmanager:9093

rule_files:
  - "alerts.yml"

scrape_configs:
  # Prometheus self-monitoring
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]

  # Pushgateway — batch jobs (ingest pipeline)
  - job_name: "pushgateway"
    honor_labels: true
    static_configs:
      - targets: ["pushgateway:9091"]
    metric_relabel_configs:
      - source_labels: [__name__]
        regex: "push_time_seconds|push_failure_time_seconds"
        action: drop

  # Quant platform long-running services (execution, OMS, strategy)
  # These expose /metrics on port 8000 via prometheus_client HTTP server.
  - job_name: "quant-execution"
    static_configs:
      - targets: ["host.docker.internal:8000"]
    relabel_configs:
      - target_label: service
        replacement: execution

  # Node exporter (host metrics) — optional, add if running node-exporter
  # - job_name: "node"
  #   static_configs:
  #     - targets: ["node-exporter:9100"]
