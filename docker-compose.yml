version: "3.9"

# Local development stack for the quant platform.
# Provides TimescaleDB, Redis, and MinIO (S3-compatible object store).
#
# Usage:
#   docker compose up -d          # start all services
#   docker compose down -v        # stop and remove volumes
#   docker compose logs -f <svc>  # tail logs for a service

services:
  # ---------------------------------------------------------------------------
  # TimescaleDB — PostgreSQL with time-series hypertables
  # Used for: market data, tick storage, aggregated OHLCV
  # ---------------------------------------------------------------------------
  timescaledb:
    image: timescale/timescaledb:latest-pg16
    container_name: quant_timescaledb
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-quant}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-quantpass}
      POSTGRES_DB: ${POSTGRES_DB:-quant}
    ports:
      - "${TIMESCALEDB_PORT:-5432}:5432"
    volumes:
      - timescaledb_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-quant} -d ${POSTGRES_DB:-quant}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - quant_dev

  # ---------------------------------------------------------------------------
  # Redis — feature cache and pub/sub
  # Used for: feature engine cache (RedisFeatureCache), signal distribution
  # ---------------------------------------------------------------------------
  redis:
    image: redis:7.2-alpine
    container_name: quant_redis
    command: redis-server --appendonly yes --maxmemory 512mb --maxmemory-policy allkeys-lru
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - quant_dev

  # ---------------------------------------------------------------------------
  # MinIO — S3-compatible object storage
  # Used for: parquet data lake, model artifacts, backtest results
  # ---------------------------------------------------------------------------
  minio:
    image: minio/minio:RELEASE.2024-03-21T23-13-43Z
    container_name: quant_minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    ports:
      - "${MINIO_API_PORT:-9000}:9000"    # S3 API
      - "${MINIO_CONSOLE_PORT:-9001}:9001" # Web console
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 15s
      timeout: 10s
      retries: 5
    restart: unless-stopped
    networks:
      - quant_dev

  # ---------------------------------------------------------------------------
  # MinIO bucket init — creates required buckets on first start
  # ---------------------------------------------------------------------------
  minio-init:
    image: minio/mc:RELEASE.2024-03-20T23-50-36Z
    container_name: quant_minio_init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://minio:9000 ${MINIO_ROOT_USER:-minioadmin} ${MINIO_ROOT_PASSWORD:-minioadmin};
        mc mb --ignore-existing local/${MINIO_BUCKET_MARKET_DATA:-quant-market-data};
        mc mb --ignore-existing local/${MINIO_BUCKET_BACKTEST:-quant-backtest};
        mc mb --ignore-existing local/${MINIO_BUCKET_MODELS:-quant-models};
        echo 'MinIO buckets ready.';
      "
    networks:
      - quant_dev
    restart: "no"

volumes:
  timescaledb_data:
  redis_data:
  minio_data:

networks:
  quant_dev:
    driver: bridge
