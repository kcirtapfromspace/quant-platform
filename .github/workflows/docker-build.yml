name: Docker Build (ARM64)

on:
  push:
    branches: [main, develop]
    paths:
      - "quant-rs/**"
      - "frontend/**"
      - "demo/**"
      - "Dockerfile.runE"
      - ".github/workflows/docker-build.yml"
  pull_request:
    branches: [main, develop]
    paths:
      - "quant-rs/**"
      - "frontend/**"
      - "demo/**"
      - "Dockerfile.runE"
  workflow_dispatch: {}


concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/quant-rs

jobs:
  # ---------------------------------------------------------------------------
  # Build quant-rs ARM64 image and push to ghcr.io
  # Native ARM64 build on self-hosted Turing Pi runner — no QEMU needed.
  # ---------------------------------------------------------------------------
  build:
    name: Build ARM64 image
    runs-on: [self-hosted, linux, arm64]

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=sha,prefix=sha-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push (standard image)
        uses: docker/build-push-action@v5
        with:
          context: ./quant-rs
          file: ./quant-rs/Dockerfile
          platforms: linux/arm64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:cache
          cache-to: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:cache,mode=max

      - name: Build GPU image (build-check only, not pushed automatically)
        uses: docker/build-push-action@v5
        with:
          context: ./quant-rs
          file: ./quant-rs/Dockerfile.gpu
          platforms: linux/arm64
          push: false
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:gpu-r36.4.0
          cache-from: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:gpu-cache
          cache-to: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:gpu-cache,mode=max

  # ---------------------------------------------------------------------------
  # Build quant-run-e ARM64 image (pure-Rust run-E daemon) — replaces quant-py
  # QUA-99: Python daemon deleted; quant run loop wires signal pipeline + Alpaca
  # ---------------------------------------------------------------------------
  build-run-e:
    name: Build quant-run-e ARM64 image
    runs-on: [self-hosted, linux, arm64]

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Extract Docker metadata
        id: meta-run-e
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository_owner }}/quant-run-e
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=sha,prefix=sha-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push quant-run-e
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile.runE
          platforms: linux/arm64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta-run-e.outputs.tags }}
          labels: ${{ steps.meta-run-e.outputs.labels }}
          cache-from: type=registry,ref=${{ env.REGISTRY }}/${{ github.repository_owner }}/quant-run-e:cache
          cache-to: type=registry,ref=${{ env.REGISTRY }}/${{ github.repository_owner }}/quant-run-e:cache,mode=max

  # ---------------------------------------------------------------------------
  # Build quant-api ARM64 image (Axum REST + WebSocket gateway)
  # QUA-111 / QUA-109: production API gateway for trading dashboard
  # ---------------------------------------------------------------------------
  build-api:
    name: Build quant-api ARM64 image
    runs-on: [self-hosted, linux, arm64]

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Extract Docker metadata
        id: meta-api
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository_owner }}/quant-api
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=sha,prefix=sha-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push quant-api
        uses: docker/build-push-action@v5
        with:
          context: ./quant-rs
          file: ./quant-rs/quant-api/Dockerfile
          platforms: linux/arm64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta-api.outputs.tags }}
          labels: ${{ steps.meta-api.outputs.labels }}
          cache-from: |
            type=registry,ref=${{ env.REGISTRY }}/${{ github.repository_owner }}/quant-api:cache
            type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:cache
          cache-to: type=registry,ref=${{ env.REGISTRY }}/${{ github.repository_owner }}/quant-api:cache,mode=max

  # ---------------------------------------------------------------------------
  # Build quant-frontend ARM64 image (nginx + React 19 SPA)
  # QUA-110 / QUA-109: production trading dashboard frontend
  # ---------------------------------------------------------------------------
  build-frontend:
    name: Build quant-frontend ARM64 image
    runs-on: [self-hosted, linux, arm64]

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Extract Docker metadata
        id: meta-fe
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository_owner }}/quant-frontend
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=sha,prefix=sha-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push quant-frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          platforms: linux/arm64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta-fe.outputs.tags }}
          labels: ${{ steps.meta-fe.outputs.labels }}
          cache-from: type=registry,ref=${{ env.REGISTRY }}/${{ github.repository_owner }}/quant-frontend:cache
          cache-to: type=registry,ref=${{ env.REGISTRY }}/${{ github.repository_owner }}/quant-frontend:cache,mode=max

  # ---------------------------------------------------------------------------
  # Build quant-dashboard ARM64 image (React+Express, QUA-95)
  # Full production dashboard: 7-page React SPA + Express API server.
  # ---------------------------------------------------------------------------
  build-dashboard:
    name: Build quant-dashboard ARM64 image
    runs-on: [self-hosted, linux, arm64]

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Extract Docker metadata
        id: meta-dash
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository_owner }}/quant-dashboard
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=sha,prefix=sha-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push quant-dashboard
        uses: docker/build-push-action@v5
        with:
          context: ./demo
          file: ./demo/Dockerfile
          platforms: linux/arm64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta-dash.outputs.tags }}
          labels: ${{ steps.meta-dash.outputs.labels }}
          cache-from: type=registry,ref=${{ env.REGISTRY }}/${{ github.repository_owner }}/quant-dashboard:cache
          cache-to: type=registry,ref=${{ env.REGISTRY }}/${{ github.repository_owner }}/quant-dashboard:cache,mode=max

  # ---------------------------------------------------------------------------
  # Also push to the local Turing Pi cluster registry (same runner, no extra hop).
  # ---------------------------------------------------------------------------
  push-local:
    name: Push to local registry
    needs: build
    runs-on: [self-hosted, linux, arm64]
    if: >
      github.event_name != 'pull_request' &&
      github.ref == 'refs/heads/main'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push to local registry (native ARM64)
        uses: docker/build-push-action@v5
        with:
          context: ./quant-rs
          file: ./quant-rs/Dockerfile
          platforms: linux/arm64
          push: true
          tags: |
            mirror.registry:5000/quant-rs:latest
            mirror.registry:5000/quant-rs:sha-${{ github.sha }}
          cache-from: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:cache
